<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Miller Packing">
<title>Miller Family Packing 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
:root {
  --bg:#f0f4f8;--surface:#fff;--surface2:#f8fafc;--border:#e2e8f0;
  --text:#1a202c;--muted:#718096;--accent:#667eea;--accent2:#764ba2;
  --green:#48bb78;--green-bg:#f0fff4;--red:#fc5c7d;
  --checked-text:#a0aec0;--checked-bg:#f7fafc;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
  --shadow-lg:0 10px 25px rgba(0,0,0,.15);
  --r:14px;--r-sm:8px;--tap:52px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden}
.header{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:14px 14px 0;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(102,126,234,.4)}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:10px}
.header-left{flex:1;min-width:0}
.header-title{font-size:18px;font-weight:900;letter-spacing:-.3px}
.header-sub{font-size:11px;opacity:.8;font-weight:600;margin-top:1px}
.header-actions{display:flex;gap:8px;flex-shrink:0}
.hbtn{background:rgba(255,255,255,.2);border:none;color:#fff;padding:8px 12px;border-radius:20px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;min-height:38px;display:flex;align-items:center;gap:5px;white-space:nowrap}
.hbtn:active{background:rgba(255,255,255,.35)}
.hbtn.active-mode{background:rgba(255,220,50,.3);color:#ffe566}
.days-bar{background:rgba(255,255,255,.15);margin:0 -14px;padding:9px 14px;display:flex;align-items:center;gap:10px;border-top:1px solid rgba(255,255,255,.1)}
.days-label{font-size:13px;font-weight:700;color:#fff;opacity:.9;flex-shrink:0}
.days-stepper{display:flex;align-items:center;background:rgba(255,255,255,.2);border-radius:20px;overflow:hidden}
.days-btn{border:none;background:transparent;color:#fff;font-size:18px;font-weight:900;padding:6px 13px;cursor:pointer;line-height:1;min-height:34px;display:flex;align-items:center;justify-content:center}
.days-btn:active{background:rgba(255,255,255,.2)}
.days-val{color:#fff;font-size:15px;font-weight:900;min-width:28px;text-align:center}
.days-note{font-size:11px;color:rgba(255,255,255,.7);font-weight:600}
.person-tabs{display:flex;gap:5px;overflow-x:auto;padding-bottom:0;scrollbar-width:none}
.person-tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:9px 14px;border-radius:10px 10px 0 0;font-size:13px;font-weight:800;cursor:pointer;border:none;background:rgba(255,255,255,.15);color:rgba(255,255,255,.75);white-space:nowrap;display:flex;align-items:center;gap:5px;min-height:40px}
.tab.active{background:var(--surface);color:var(--accent)}
.tab .badge{background:rgba(255,255,255,.3);border-radius:10px;font-size:10px;padding:1px 5px;font-weight:800}
.tab.active .badge{background:var(--accent);color:#fff}
.progress-area{background:var(--surface);padding:11px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.progress-bar-wrap{flex:1;background:var(--border);border-radius:99px;height:8px;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:99px;transition:width .4s ease}
.progress-label{font-size:13px;font-weight:800;color:var(--accent);min-width:44px;text-align:right}
.filters{background:var(--surface);padding:9px 14px;display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border)}
.filters::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:6px 13px;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;border:2px solid var(--border);background:var(--surface);color:var(--muted);min-height:34px;display:flex;align-items:center}
.chip.active{border-color:var(--accent);background:#ede9fe;color:var(--accent)}
.chip:active{transform:scale(.95)}
.content{padding:12px;padding-bottom:40px}
.cat-block{margin-bottom:14px}
.cat-header{font-size:11px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;padding:4px 4px 8px;display:flex;align-items:center;gap:6px}
.cat-count{background:var(--border);border-radius:99px;padding:1px 7px;font-size:10px;color:var(--muted)}
.cat-count.done{background:var(--green-bg);color:var(--green)}
.items-list{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
.item-row{display:flex;align-items:center;min-height:var(--tap);padding:0 12px;border-bottom:1px solid var(--border);cursor:pointer;gap:10px;user-select:none;-webkit-user-select:none;transition:background .12s}
.item-row:last-child{border-bottom:none}
.item-row:active:not(.edit-row){background:var(--surface2)}
.item-row.checked{background:var(--checked-bg)}
.check-circle{width:28px;height:28px;border-radius:50%;border:2.5px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;background:var(--surface)}
.item-row.checked .check-circle{border-color:var(--green);background:var(--green)}
.checkmark{display:none;color:#fff;font-size:14px;font-weight:900}
.item-row.checked .checkmark{display:block}
.item-name{flex:1;font-size:15px;font-weight:700;line-height:1.3;transition:color .15s}
.item-row.checked .item-name{color:var(--checked-text);text-decoration:line-through}
.item-qty{font-size:12px;font-weight:800;color:var(--muted);background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:2px 7px;flex-shrink:0}
.item-row.checked .item-qty{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.item-row.edit-row{cursor:default;background:var(--surface)}
.edit-row .check-circle{display:none}
.edit-row .item-qty{display:none}
.edit-controls{display:flex;align-items:center;gap:6px;flex-shrink:0}
.qty-edit{width:52px;border:2px solid var(--border);border-radius:var(--r-sm);padding:4px 6px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;text-align:center;color:var(--text);background:var(--surface2)}
.qty-edit:focus{outline:none;border-color:var(--accent)}
.del-btn{background:none;border:none;color:#cbd5e0;font-size:18px;cursor:pointer;padding:6px;line-height:1;min-width:32px;min-height:32px;display:flex;align-items:center;justify-content:center;border-radius:var(--r-sm)}
.del-btn:active{color:var(--red);background:#fff0f3}
.rate-btn{background:none;border:1px solid var(--border);color:var(--muted);font-size:10px;font-weight:700;cursor:pointer;padding:3px 6px;border-radius:6px;line-height:1.2;white-space:nowrap}
.rate-btn.active{background:#ede9fe;border-color:var(--accent);color:var(--accent)}
.add-item-row{display:flex;align-items:center;gap:7px;padding:9px 12px;background:var(--surface2);border-top:2px dashed var(--border)}
.add-input{flex:1;border:2px solid var(--border);border-radius:var(--r-sm);padding:8px 10px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;color:var(--text);background:var(--surface)}
.add-input:focus{outline:none;border-color:var(--accent)}
.add-qty{width:50px;border:2px solid var(--border);border-radius:var(--r-sm);padding:8px 5px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;text-align:center;color:var(--text);background:var(--surface)}
.add-qty:focus{outline:none;border-color:var(--accent)}
.add-btn{background:var(--accent);border:none;color:#fff;border-radius:var(--r-sm);padding:8px 11px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;white-space:nowrap;min-height:var(--tap);display:flex;align-items:center}
.add-btn:active{opacity:.85}
.add-cat-row{display:flex;align-items:center;gap:8px;padding:12px;background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow);margin-top:12px}
.add-cat-input{flex:1;border:2px solid var(--border);border-radius:var(--r-sm);padding:10px 12px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;color:var(--text);background:var(--surface2)}
.add-cat-input:focus{outline:none;border-color:var(--accent)}
.add-cat-btn{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff;border-radius:var(--r-sm);padding:10px 14px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;white-space:nowrap;min-height:var(--tap);display:flex;align-items:center}
.add-cat-btn:active{opacity:.85}
.cat-del-btn{background:none;border:none;color:#cbd5e0;font-size:16px;cursor:pointer;padding:4px;line-height:1;margin-left:2px}
.cat-del-btn:active{color:var(--red)}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:999;align-items:flex-end;justify-content:center;padding:16px}
.overlay.open{display:flex}
.modal{background:var(--surface);border-radius:20px;padding:22px;width:100%;max-width:400px;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal h2{font-size:17px;font-weight:900;margin-bottom:8px}
.modal p{font-size:14px;color:var(--muted);margin-bottom:18px;line-height:1.5}
.modal-btns{display:flex;flex-direction:column;gap:9px}
.btn{padding:14px;border-radius:var(--r);border:none;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;min-height:var(--tap)}
.btn-cancel{background:var(--surface2);color:var(--muted)}
.btn-danger{background:linear-gradient(135deg,#fc5c7d,#6a3093);color:#fff}
.btn-warn{background:linear-gradient(135deg,#f093fb,#f5576c);color:#fff}
</style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <div class="header-left">
      <div class="header-title">✈️ Miller Family 2026</div>
      <div class="header-sub" id="headerSub">Tap any item to pack it</div>
    </div>
    <div class="header-actions">
      <button class="hbtn" id="editBtn" onclick="toggleEditMode()">✏️ Edit</button>
      <button class="hbtn" onclick="openReset()">🔄 Reset</button>
    </div>
  </div>
  <div class="days-bar">
    <span class="days-label">Trip Length:</span>
    <div class="days-stepper">
      <button class="days-btn" onclick="changeDays(-1)">−</button>
      <span class="days-val" id="daysVal">10</span>
      <button class="days-btn" onclick="changeDays(1)">+</button>
    </div>
    <span class="days-note">days · quantities auto-update</span>
  </div>
  <div class="person-tabs" id="personTabs"></div>
</div>
<div class="progress-area">
  <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
  <div class="progress-label" id="progressLabel">0%</div>
</div>
<div class="filters" id="catFilters"></div>
<div class="content" id="content"></div>
<div class="overlay" id="resetModal">
  <div class="modal">
    <h2>🔄 Reset Packing List</h2>
    <p>Choose what to reset. Checked items will be cleared.</p>
    <div class="modal-btns">
      <button class="btn btn-warn" onclick="resetPerson()">Reset <span id="resetPersonName"></span> Only</button>
      <button class="btn btn-danger" onclick="resetAll()">Reset Everyone</button>
      <button class="btn btn-cancel" onclick="closeModal('resetModal')">Cancel</button>
    </div>
  </div>
</div>
<div class="overlay" id="delItemModal">
  <div class="modal">
    <h2>🗑 Delete Item?</h2>
    <p id="delItemMsg"></p>
    <div class="modal-btns">
      <button class="btn btn-danger" onclick="confirmDelItem()">Delete</button>
      <button class="btn btn-cancel" onclick="closeModal('delItemModal')">Cancel</button>
    </div>
  </div>
</div>
<div class="overlay" id="delCatModal">
  <div class="modal">
    <h2>🗑 Delete Category?</h2>
    <p id="delCatMsg"></p>
    <div class="modal-btns">
      <button class="btn btn-danger" onclick="confirmDelCat()">Delete</button>
      <button class="btn btn-cancel" onclick="closeModal('delCatModal')">Cancel</button>
    </div>
  </div>
</div>

const SK='millerPacking2026_v3';
let state={days:10,checked:{},lists:null};
let editMode=false,curP='Noah',curF='All',pendingDel=null;

function loadState(){
  try{const s=localStorage.getItem(SK);if(s){const p=JSON.parse(s);state.days=p.days??10;state.checked=p.checked??{};state.lists=p.lists??null;}}catch(e){}
  if(!state.lists)state.lists=JSON.parse(JSON.stringify(DD));
}
function saveState(){try{localStorage.setItem(SK,JSON.stringify(state));}catch(e){}}
function L(){return state.lists;}
function calcQty(item){return item.qpd>0?Math.max(1,Math.ceil(item.qpd*state.days)):item.fixed;}
function ck(p,c,n){return p+'|'+c+'|'+n;}
function isChk(p,c,n){return!!state.checked[ck(p,c,n)];}
function toggleItem(p,c,n){if(editMode)return;state.checked[ck(p,c,n)]=!state.checked[ck(p,c,n)];saveState();renderContent();updateProg();renderTabs();}

function pCounts(p){let t=0,d=0;for(const c in L()[p].categories)for(const i of L()[p].categories[c]){t++;if(isChk(p,c,i.n))d++;}return{t,d};}
function cCounts(p,c){let t=0,d=0;for(const i of L()[p].categories[c]){t++;if(isChk(p,c,i.n))d++;}return{t,d};}

function toggleEditMode(){editMode=!editMode;document.getElementById('editBtn').classList.toggle('active-mode',editMode);document.getElementById('editBtn').textContent=editMode?'✅ Done':'✏️ Edit';document.getElementById('headerSub').textContent=editMode?'Edit items, quantities & categories':'Tap any item to pack it';renderAll();}

function updateItemQty(p,c,idx,val){const v=parseFloat(val);if(isNaN(v)||v<0)return;const item=L()[p].categories[c][idx];if(item.qpd>0)item.qpd=v;else item.fixed=Math.round(v);saveState();updateProg();renderTabs();}
function toggleRate(p,c,idx){const item=L()[p].categories[c][idx];if(item.qpd>0){item.fixed=Math.max(1,Math.ceil(item.qpd*state.days));item.qpd=0;}else{item.qpd=Math.max(0.1,+(item.fixed/state.days).toFixed(2));item.fixed=0;}saveState();renderContent();}

function escAttr(s){return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'");}
function safeId(p,c){return (p+'_'+c).replace(/[^a-zA-Z0-9]/g,'_');}

function promptDelItem(p,c,idx){pendingDel={type:'item',p,c,idx};document.getElementById('delItemMsg').textContent='Delete "'+L()[p].categories[c][idx].n+'" from '+c+'? This cannot be undone.';openOv('delItemModal');}
function confirmDelItem(){if(!pendingDel)return;const{p,c,idx}=pendingDel;const rm=L()[p].categories[c].splice(idx,1)[0];delete state.checked[ck(p,c,rm.n)];saveState();closeModal('delItemModal');renderAll();}
function promptDelCat(p,c){pendingDel={type:'cat',p,c};document.getElementById('delCatMsg').textContent='Delete the entire "'+c+'" category for '+p+'? All '+L()[p].categories[c].length+' items will be removed.';openOv('delCatModal');}
function confirmDelCat(){if(!pendingDel)return;const{p,c}=pendingDel;L()[p].categories[c].forEach(i=>delete state.checked[ck(p,c,i.n)]);delete L()[p].categories[c];if(curF===c)curF='All';saveState();closeModal('delCatModal');renderAll();}

function addItem(p,c){const sid=safeId(p,c);const ni=document.getElementById('ai_'+sid);const qi=document.getElementById('aq_'+sid);const name=(ni.value||'').trim();if(!name){ni.focus();return;}const qty=parseInt(qi.value)||1;L()[p].categories[c].push({n:name,qpd:0,fixed:qty});ni.value='';qi.value='1';saveState();renderContent();updateProg();renderTabs();ni.focus();}
function addCat(p){const sid=safeId(p,'cat');const inp=document.getElementById('ac_'+sid);const name=(inp.value||'').trim();if(!name||L()[p].categories[name]){inp.value='';return;}L()[p].categories[name]=[];inp.value='';saveState();renderAll();}

function changeDays(d){state.days=Math.max(1,Math.min(30,state.days+d));document.getElementById('daysVal').textContent=state.days;saveState();renderContent();updateProg();renderTabs();}

function openReset(){document.getElementById('resetPersonName').textContent=curP;openOv('resetModal');}
function resetPerson(){for(const c in L()[curP].categories)L()[curP].categories[c].forEach(i=>delete state.checked[ck(curP,c,i.n)]);saveState();closeModal('resetModal');renderAll();}
function resetAll(){state.checked={};saveState();closeModal('resetModal');renderAll();}
function openOv(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');pendingDel=null;}

function renderTabs(){const con=document.getElementById('personTabs');con.innerHTML='';for(const[p,data]of Object.entries(L())){const{t,d}=pCounts(p);const btn=document.createElement('button');btn.className='tab'+(p===curP?' active':'');btn.innerHTML=data.emoji+' '+p+' <span class="badge">'+d+'/'+t+'</span>';btn.onclick=(()=>{const _p=p;return()=>{curP=_p;curF='All';renderAll();}})();con.appendChild(btn);}}

function renderFilters(){const con=document.getElementById('catFilters');con.innerHTML='';const cats=Object.keys(L()[curP].categories);const allC=document.createElement('button');allC.className='chip'+(curF==='All'?' active':'');allC.textContent='All';allC.onclick=()=>{curF='All';renderFilters();renderContent();};con.appendChild(allC);for(const cat of cats){const ch=document.createElement('button');ch.className='chip'+(curF===cat?' active':'');ch.textContent=cat;ch.onclick=(()=>{const _c=cat;return()=>{curF=_c;renderFilters();renderContent();}})();con.appendChild(ch);}}

function renderContent(){
  const container=document.getElementById('content');
  const cats=L()[curP].categories;
  const keys=curF==='All'?Object.keys(cats):[curF];
  container.innerHTML='';
  const p=curP;
  for(const cat of keys){
    if(!cats[cat])continue;
    const items=cats[cat];
    const{t,d}=cCounts(p,cat);
    const allDone=d===t&&t>0;
    const block=document.createElement('div');
    block.className='cat-block';
    const hdr=document.createElement('div');
    hdr.className='cat-header';
    const countEl=document.createElement('span');
    countEl.className='cat-count'+(allDone?' done':'');
    countEl.textContent=d+'/'+t;
    if(editMode){
      const sp=document.createElement('span');sp.style.flex='1';sp.textContent=cat;hdr.appendChild(sp);hdr.appendChild(countEl);
      const dc=document.createElement('button');dc.className='cat-del-btn';dc.innerHTML='🗑';
      const _c=cat;dc.onclick=()=>promptDelCat(p,_c);hdr.appendChild(dc);
    }else{
      hdr.appendChild(document.createTextNode(cat+' '));hdr.appendChild(countEl);
      if(allDone){const sp=document.createElement('span');sp.textContent=' ✅';hdr.appendChild(sp);}
    }
    block.appendChild(hdr);
    const list=document.createElement('div');list.className='items-list';
    items.forEach((item,idx)=>{
      const checked=isChk(p,cat,item.n);
      const qty=calcQty(item);
      const row=document.createElement('div');
      if(editMode){
        row.className='item-row edit-row';
        const isDyn=item.qpd>0;
        const qVal=isDyn?item.qpd:item.fixed;
        const nm=document.createElement('div');nm.className='item-name';nm.textContent=item.n;
        const ec=document.createElement('div');ec.className='edit-controls';
        const rb=document.createElement('button');rb.className='rate-btn'+(isDyn?' active':'');rb.textContent=isDyn?'×/day':'fixed';
        const _p=p,_c=cat,_i=idx;
        rb.onclick=()=>toggleRate(_p,_c,_i);
        const qe=document.createElement('input');qe.className='qty-edit';qe.type='number';qe.min='0';qe.step=isDyn?'0.1':'1';qe.value=qVal;
        qe.onchange=()=>updateItemQty(_p,_c,_i,qe.value);qe.onclick=()=>qe.select();
        const db=document.createElement('button');db.className='del-btn';db.innerHTML='🗑';
        db.onclick=()=>promptDelItem(_p,_c,_i);
        ec.appendChild(rb);ec.appendChild(qe);ec.appendChild(db);
        row.appendChild(nm);row.appendChild(ec);
      }else{
        row.className='item-row'+(checked?' checked':'');
        const cc=document.createElement('div');cc.className='check-circle';
        const ck2=document.createElement('span');ck2.className='checkmark';ck2.textContent='✓';cc.appendChild(ck2);
        const nm=document.createElement('div');nm.className='item-name';nm.textContent=item.n;
        row.appendChild(cc);row.appendChild(nm);
        if(qty>1){const qd=document.createElement('div');qd.className='item-qty';qd.textContent='×'+qty;row.appendChild(qd);}
        const _p=p,_c=cat,_n=item.n;
        row.addEventListener('click',()=>toggleItem(_p,_c,_n));
      }
      list.appendChild(row);
    });
    if(editMode){
      const sid=safeId(p,cat);
      const ar=document.createElement('div');ar.className='add-item-row';
      ar.innerHTML='<input id="ai_'+sid+'" class="add-input" type="text" placeholder="Add item…"><input id="aq_'+sid+'" class="add-qty" type="number" min="1" value="1"><button class="add-btn">+ Add</button>';
      ar.querySelector('input').addEventListener('keydown',function(e){if(e.key==='Enter'){const _p=p,_c=cat;addItem(_p,_c);}});
      ar.querySelector('.add-btn').onclick=(()=>{const _p=p,_c=cat;return()=>addItem(_p,_c);})();
      list.appendChild(ar);
    }
    block.appendChild(list);container.appendChild(block);
  }
  if(editMode&&curF==='All'){
    const sid=safeId(p,'cat');
    const acr=document.createElement('div');acr.className='add-cat-row';
    acr.innerHTML='<input id="ac_'+sid+'" class="add-cat-input" type="text" placeholder="New category name…"><button class="add-cat-btn">+ Category</button>';
    acr.querySelector('input').addEventListener('keydown',function(e){if(e.key==='Enter')addCat(p);});
    acr.querySelector('.add-cat-btn').onclick=()=>addCat(p);
    container.appendChild(acr);
  }
}

function updateProg(){const{t,d}=pCounts(curP);const pct=t?Math.round(d/t*100):0;document.getElementById('progressBar').style.width=pct+'%';document.getElementById('progressLabel').textContent=pct+'%';}
function renderAll(){renderTabs();renderFilters();renderContent();updateProg();}

loadState();
document.getElementById('daysVal').textContent=state.days;
renderAll();
['resetModal','delItemModal','delCatModal'].forEach(id=>{document.getElementById(id).addEventListener('click',function(e){if(e.target===this)closeModal(id);});});

</script>
</body>
</html>
